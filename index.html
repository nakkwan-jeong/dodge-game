<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NEON DODGE : Survival</title>
  <style>
    :root {
      --bg1: #050816;
      --bg2: #0b1228;
      --cyan: #53f3ff;
      --pink: #ff4fd8;
      --red: #ff4d6d;
      --yellow: #ffd166;
      --white: #f4f7ff;
      --glass: rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top, #0e1635 0%, #060a18 45%, #03050d 100%);
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--white);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      gap: 10px;
      z-index: 10;
      pointer-events: none;
    }

    .panel {
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 12px 14px;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.32),
        inset 0 1px 0 rgba(255,255,255,0.06);
      min-width: 120px;
    }

    .title-mini {
      font-size: 11px;
      letter-spacing: 1.5px;
      opacity: 0.75;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .big {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 0 0 12px rgba(83,243,255,0.18);
    }

    .big.small {
      font-size: 18px;
    }

    .leftGroup, .rightGroup {
      display: flex;
      gap: 10px;
    }

    .centerTop {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
    }

    .levelBadge {
      background: linear-gradient(90deg, rgba(83,243,255,0.18), rgba(255,79,216,0.16));
      border: 1px solid rgba(255,255,255,0.14);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at center, rgba(18,30,69,0.45), rgba(3,5,13,0.85));
    }

    .card {
      width: min(92vw, 460px);
      border-radius: 28px;
      padding: 24px 22px 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 18px 60px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.08);
      text-align: center;
    }

    .logo {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-shadow:
        0 0 18px rgba(83,243,255,0.26),
        0 0 28px rgba(255,79,216,0.12);
    }

    .logo .cyan { color: var(--cyan); }
    .logo .pink { color: var(--pink); }

    .subtitle {
      opacity: 0.8;
      line-height: 1.55;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .infoList {
      text-align: left;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 18px;
      font-size: 14px;
      line-height: 1.7;
    }

    .infoList b {
      color: var(--cyan);
    }

    .btnWrap {
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    .btn {
      appearance: none;
      border: 0;
      outline: 0;
      cursor: pointer;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.3px;
      transition: transform 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.primary {
      background: linear-gradient(90deg, var(--cyan), #5ad0ff);
      color: #051320;
      box-shadow: 0 10px 30px rgba(83,243,255,0.24);
    }

    .btn.secondary {
      background: linear-gradient(90deg, #1e2744, #12192f);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .result {
      font-size: 15px;
      line-height: 1.8;
      text-align: left;
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 14px 16px;
      margin: 16px 0 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .result strong {
      color: var(--yellow);
    }

    .hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0.9;
      pointer-events: none;
    }

    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 77, 109, 0);
      pointer-events: none;
      z-index: 15;
      transition: background 0.15s ease;
    }

    @media (max-width: 640px) {
      .hud {
        top: 10px;
        left: 10px;
        right: 10px;
        gap: 8px;
      }

      .panel {
        padding: 10px 12px;
        min-width: auto;
      }

      .big {
        font-size: 18px;
      }

      .big.small {
        font-size: 16px;
      }

      .title-mini {
        font-size: 10px;
      }

      .hint {
        bottom: 12px;
        font-size: 12px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="leftGroup">
      <div class="panel">
        <div class="title-mini">SURVIVAL</div>
        <div class="big" id="timeText">0.00s</div>
      </div>
      <div class="panel">
        <div class="title-mini">BEST</div>
        <div class="big small" id="bestText">0.00s</div>
      </div>
    </div>

    <div class="rightGroup">
      <div class="panel">
        <div class="title-mini">SPEED</div>
        <div class="big small" id="speedText">1.0x</div>
      </div>
      <div class="panel">
        <div class="title-mini">HAZARD</div>
        <div class="big small" id="hazardText">LOW</div>
      </div>
    </div>
  </div>

  <div class="centerTop">
    <div class="levelBadge" id="levelText">LEVEL 1</div>
  </div>

  <div class="hint" id="hintText">손가락으로 플레이어를 끌어서 생존하세요</div>
  <div class="flash" id="flash"></div>

  <div class="overlay" id="startOverlay">
    <div class="card">
      <div class="logo"><span class="cyan">NEON</span> <span class="pink">DODGE</span></div>
      <div class="subtitle">
        피지컬로 버티는 모바일 생존 게임<br>
        친구들과 <b>생존 시간</b>으로 바로 승부 보세요
      </div>

      <div class="infoList">
        • <b>조작</b>: 플레이어를 손가락으로 직접 드래그<br>
        • <b>목표</b>: 적, 추격 구체, 레이저를 피하며 최대한 오래 생존<br>
        • <b>난이도</b>: 시간이 갈수록 속도와 개수가 빠르게 증가
      </div>

      <div class="btnWrap">
        <button class="btn primary" id="startBtn">게임 시작</button>
        <button class="btn secondary" id="howBtn">조작 팁 보기</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="gameOverOverlay" style="display:none;">
    <div class="card">
      <div class="logo"><span class="pink">GAME</span> <span class="cyan">OVER</span></div>

      <div class="result" id="resultText">
        생존 시간: <strong>0.00s</strong>
      </div>

      <div class="btnWrap">
        <button class="btn primary" id="restartBtn">다시 도전</button>
        <button class="btn secondary" id="closeBtn">결과 닫기</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const timeText = document.getElementById("timeText");
    const bestText = document.getElementById("bestText");
    const speedText = document.getElementById("speedText");
    const hazardText = document.getElementById("hazardText");
    const levelText = document.getElementById("levelText");
    const hintText = document.getElementById("hintText");
    const flashEl = document.getElementById("flash");

    const startOverlay = document.getElementById("startOverlay");
    const gameOverOverlay = document.getElementById("gameOverOverlay");
    const resultText = document.getElementById("resultText");
    const startBtn = document.getElementById("startBtn");
    const howBtn = document.getElementById("howBtn");
    const restartBtn = document.getElementById("restartBtn");
    const closeBtn = document.getElementById("closeBtn");

    // ====== 캔버스 리사이즈 ======
    let DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    function resizeCanvas() {
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.floor(window.innerWidth * DPR);
      canvas.height = Math.floor(window.innerHeight * DPR);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // ====== 게임 상태 ======
    let gameRunning = false;
    let gameOver = false;
    let startTime = 0;
    let elapsed = 0;
    let best = Number(localStorage.getItem("neon_dodge_best") || 0);

    const state = {
      difficulty: 1,
      speedMultiplier: 1,
      level: 1,
      lastTime: 0,
      spawnTimerA: 0,
      spawnTimerB: 0,
      spawnTimerC: 0,
      laserTimer: 0,
      particles: [],
      meteors: [],
      darts: [],
      chasers: [],
      lasers: [],
      stars: []
    };

    bestText.textContent = best.toFixed(2) + "s";

    // ====== 플레이어 ======
    const player = {
      x: 0,
      y: 0,
      r: 12,
      glow: 18,
      color: "#53f3ff",
      alive: true
    };

    function resetPlayer() {
      player.x = window.innerWidth / 2;
      player.y = window.innerHeight * 0.78;
      player.alive = true;
    }

    // ====== 입력 ======
    let dragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let hintHidden = false;

    function getPos(e) {
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX, y: t.clientY };
    }

    function pointerDown(e) {
      if (!gameRunning) return;
      const p = getPos(e);
      const dx = p.x - player.x;
      const dy = p.y - player.y;
      const dist = Math.hypot(dx, dy);

      // 플레이어 근처를 터치한 경우 드래그 시작
      if (dist < 80) {
        dragging = true;
        dragOffsetX = dx;
        dragOffsetY = dy;
      } else {
        // 멀리 눌러도 빠르게 이동 가능하도록 즉시 따라감
        dragging = true;
        dragOffsetX = 0;
        dragOffsetY = 0;
        player.x = p.x;
        player.y = p.y;
      }

      if (!hintHidden) {
        hintText.style.opacity = "0";
        hintHidden = true;
      }
      e.preventDefault();
    }

    function pointerMove(e) {
      if (!gameRunning || !dragging) return;
      const p = getPos(e);
      player.x = p.x - dragOffsetX;
      player.y = p.y - dragOffsetY;
      clampPlayer();
      e.preventDefault();
    }

    function pointerUp(e) {
      dragging = false;
      if (e) e.preventDefault();
    }

    window.addEventListener("touchstart", pointerDown, { passive: false });
    window.addEventListener("touchmove", pointerMove, { passive: false });
    window.addEventListener("touchend", pointerUp, { passive: false });

    // 데스크톱도 대응
    window.addEventListener("mousedown", pointerDown);
    window.addEventListener("mousemove", pointerMove);
    window.addEventListener("mouseup", pointerUp);

    function clampPlayer() {
      const pad = 6;
      player.x = Math.max(player.r + pad, Math.min(window.innerWidth - player.r - pad, player.x));
      player.y = Math.max(player.r + 64, Math.min(window.innerHeight - player.r - 20, player.y));
    }

    // ====== 배경 별 ======
    function initStars() {
      state.stars = [];
      const count = Math.floor((window.innerWidth * window.innerHeight) / 9000);
      for (let i = 0; i < count; i++) {
        state.stars.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.8 + 0.4,
          a: Math.random() * 0.6 + 0.2,
          s: Math.random() * 0.2 + 0.05
        });
      }
    }
    initStars();
    window.addEventListener("resize", initStars);

    // ====== 파티클 ======
    function burst(x, y, color, amount = 18) {
      for (let i = 0; i < amount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2.8 + 0.5;
        state.particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: Math.random() * 22 + 22,
          size: Math.random() * 3 + 1,
          color
        });
      }
    }

    // ====== 적 생성 ======
    function spawnMeteor() {
      const size = Math.random() * 20 + 14;
      state.meteors.push({
        x: Math.random() * (window.innerWidth - size * 2) + size,
        y: -size - 20,
        r: size,
        vy: (Math.random() * 2.2 + 2.6) * state.speedMultiplier,
        vx: (Math.random() * 1.3 - 0.65) * state.speedMultiplier,
        rot: Math.random() * Math.PI * 2,
        spin: Math.random() * 0.08 - 0.04
      });
    }

    function spawnDart() {
      const fromLeft = Math.random() < 0.5;
      const h = Math.random() * 14 + 10;
      const w = Math.random() * 34 + 36;
      state.darts.push({
        x: fromLeft ? -w - 20 : window.innerWidth + w + 20,
        y: Math.random() * (window.innerHeight - 220) + 110,
        w,
        h,
        vx: (fromLeft ? 1 : -1) * (Math.random() * 3.5 + 5.5) * state.speedMultiplier,
        color: "#ff4fd8"
      });
    }

    function spawnChaser() {
      const edge = Math.floor(Math.random() * 4);
      let x, y;
      if (edge === 0) { x = Math.random() * window.innerWidth; y = -20; }
      if (edge === 1) { x = window.innerWidth + 20; y = Math.random() * window.innerHeight; }
      if (edge === 2) { x = Math.random() * window.innerWidth; y = window.innerHeight + 20; }
      if (edge === 3) { x = -20; y = Math.random() * window.innerHeight; }

      state.chasers.push({
        x, y,
        r: Math.random() * 10 + 10,
        speed: (Math.random() * 1.3 + 1.5) * state.speedMultiplier,
        color: "#ff6b6b"
      });
    }

    function spawnLaser() {
      const vertical = Math.random() < 0.5;
      const warningTime = 900 - Math.min(450, elapsed * 5);
      const thickness = Math.random() * 12 + 10;

      if (vertical) {
        const x = Math.random() * (window.innerWidth - 80) + 40;
        state.lasers.push({
          vertical: true,
          x,
          y: 0,
          thickness,
          warning: true,
          timer: 0,
          warningTime,
          activeTime: 480,
          done: false
        });
      } else {
        const y = Math.random() * (window.innerHeight - 220) + 90;
        state.lasers.push({
          vertical: false,
          x: 0,
          y,
          thickness,
          warning: true,
          timer: 0,
          warningTime,
          activeTime: 480,
          done: false
        });
      }
    }

    // ====== 난이도 로직 ======
    function updateDifficulty() {
      state.level = 1 + Math.floor(elapsed / 8);
      state.speedMultiplier = 1 + elapsed * 0.035;

      if (elapsed < 10) state.difficulty = 1;
      else if (elapsed < 20) state.difficulty = 2;
      else if (elapsed < 32) state.difficulty = 3;
      else if (elapsed < 48) state.difficulty = 4;
      else state.difficulty = 5;

      speedText.textContent = state.speedMultiplier.toFixed(1) + "x";
      levelText.textContent = "LEVEL " + state.level;

      const hazardNames = ["LOW", "ELEVATED", "HIGH", "EXTREME", "INSANE"];
      hazardText.textContent = hazardNames[state.difficulty - 1];
    }

    // ====== 충돌 ======
    function circleHit(ax, ay, ar, bx, by, br) {
      return Math.hypot(ax - bx, ay - by) < ar + br;
    }

    function rectCircleHit(rx, ry, rw, rh, cx, cy, cr) {
      const testX = Math.max(rx, Math.min(cx, rx + rw));
      const testY = Math.max(ry, Math.min(cy, ry + rh));
      const distX = cx - testX;
      const distY = cy - testY;
      return distX * distX + distY * distY < cr * cr;
    }

    function killPlayer(reason = "") {
      if (!player.alive) return;
      player.alive = false;
      gameRunning = false;
      gameOver = true;
      dragging = false;

      burst(player.x, player.y, "#53f3ff", 38);
      flashEl.style.background = "rgba(255,77,109,0.32)";
      setTimeout(() => flashEl.style.background = "rgba(255,77,109,0)", 160);

      if (elapsed > best) {
        best = elapsed;
        localStorage.setItem("neon_dodge_best", best);
      }
      bestText.textContent = best.toFixed(2) + "s";

      resultText.innerHTML = `
        생존 시간: <strong>${elapsed.toFixed(2)}s</strong><br>
        최고 기록: <strong>${best.toFixed(2)}s</strong><br>
        도달 레벨: <strong>${state.level}</strong><br>
        위험도: <strong>${hazardText.textContent}</strong>
      `;

      setTimeout(() => {
        gameOverOverlay.style.display = "flex";
      }, 260);
    }

    // ====== 업데이트 ======
    function update(dt) {
      if (!gameRunning) return;

      elapsed = (performance.now() - startTime) / 1000;
      timeText.textContent = elapsed.toFixed(2) + "s";
      updateDifficulty();

      // 스폰 주기
      state.spawnTimerA += dt;
      state.spawnTimerB += dt;
      state.spawnTimerC += dt;
      state.laserTimer += dt;

      const meteorGap = Math.max(260, 760 - elapsed * 16);
      const dartGap = Math.max(500, 1550 - elapsed * 18);
      const chaserGap = Math.max(900, 2600 - elapsed * 22);
      const laserGap = Math.max(2200, 5200 - elapsed * 35);

      if (state.spawnTimerA > meteorGap) {
        state.spawnTimerA = 0;
        spawnMeteor();
        if (state.difficulty >= 3 && Math.random() < 0.36) spawnMeteor();
      }

      if (state.spawnTimerB > dartGap) {
        state.spawnTimerB = 0;
        if (state.difficulty >= 2) spawnDart();
      }

      if (state.spawnTimerC > chaserGap) {
        state.spawnTimerC = 0;
        if (state.difficulty >= 3) spawnChaser();
      }

      if (state.laserTimer > laserGap) {
        state.laserTimer = 0;
        if (state.difficulty >= 2) spawnLaser();
      }

      // 별
      for (const s of state.stars) {
        s.y += s.s * state.speedMultiplier * 0.6;
        if (s.y > window.innerHeight) {
          s.y = -2;
          s.x = Math.random() * window.innerWidth;
        }
      }

      // 파티클
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.985;
        p.vy *= 0.985;
        p.life -= dt * 0.06;
        if (p.life <= 0) state.particles.splice(i, 1);
      }

      // 메테오
      for (let i = state.meteors.length - 1; i >= 0; i--) {
        const m = state.meteors[i];
        m.x += m.vx;
        m.y += m.vy;
        m.rot += m.spin;

        if (m.y - m.r > window.innerHeight + 30 || m.x < -80 || m.x > window.innerWidth + 80) {
          state.meteors.splice(i, 1);
          continue;
        }

        if (circleHit(m.x, m.y, m.r * 0.9, player.x, player.y, player.r)) {
          killPlayer("meteor");
        }
      }

      // 다트
      for (let i = state.darts.length - 1; i >= 0; i--) {
        const d = state.darts[i];
        d.x += d.vx;

        if (d.x < -200 || d.x > window.innerWidth + 200) {
          state.darts.splice(i, 1);
          continue;
        }

        if (rectCircleHit(d.x - d.w / 2, d.y - d.h / 2, d.w, d.h, player.x, player.y, player.r)) {
          killPlayer("dart");
        }
      }

      // 체이서
      for (let i = state.chasers.length - 1; i >= 0; i--) {
        const c = state.chasers[i];
        const dx = player.x - c.x;
        const dy = player.y - c.y;
        const dist = Math.hypot(dx, dy) || 1;
        c.x += (dx / dist) * c.speed;
        c.y += (dy / dist) * c.speed;

        if (circleHit(c.x, c.y, c.r, player.x, player.y, player.r)) {
          killPlayer("chaser");
        }
      }

      // 레이저
      for (let i = state.lasers.length - 1; i >= 0; i--) {
        const l = state.lasers[i];
        l.timer += dt;

        if (l.warning && l.timer >= l.warningTime) {
          l.warning = false;
          l.timer = 0;
          flashEl.style.background = "rgba(255,255,255,0.08)";
          setTimeout(() => flashEl.style.background = "rgba(255,77,109,0)", 70);
        } else if (!l.warning && l.timer >= l.activeTime) {
          state.lasers.splice(i, 1);
          continue;
        }

        // 레이저 활성시 충돌
        if (!l.warning) {
          if (l.vertical) {
            if (Math.abs(player.x - l.x) < l.thickness / 2 + player.r) {
              killPlayer("laser");
            }
          } else {
            if (Math.abs(player.y - l.y) < l.thickness / 2 + player.r) {
              killPlayer("laser");
            }
          }
        }
      }
    }

    // ====== 그리기 ======
    function drawBackground() {
      // 그리드
      ctx.save();
      ctx.globalAlpha = 0.06;
      ctx.strokeStyle = "#7aa8ff";
      ctx.lineWidth = 1;

      const grid = 36;
      for (let x = 0; x < window.innerWidth; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, window.innerHeight);
        ctx.stroke();
      }
      for (let y = 0; y < window.innerHeight; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(window.innerWidth, y);
        ctx.stroke();
      }
      ctx.restore();

      // 별
      for (const s of state.stars) {
        ctx.save();
        ctx.globalAlpha = s.a;
        ctx.fillStyle = "#cce9ff";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawPlayer() {
      ctx.save();

      // 바깥 글로우
      const grad = ctx.createRadialGradient(player.x, player.y, 2, player.x, player.y, player.glow + player.r);
      grad.addColorStop(0, "rgba(83,243,255,0.55)");
      grad.addColorStop(0.45, "rgba(83,243,255,0.20)");
      grad.addColorStop(1, "rgba(83,243,255,0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r + player.glow, 0, Math.PI * 2);
      ctx.fill();

      // 몸체
      ctx.shadowColor = "#53f3ff";
      ctx.shadowBlur = 16;
      ctx.fillStyle = "#53f3ff";
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
      ctx.fill();

      // 코어
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(player.x - 2, player.y - 2, player.r * 0.35, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawMeteors() {
      for (const m of state.meteors) {
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.rotate(m.rot);

        const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, m.r);
        grad.addColorStop(0, "rgba(255,209,102,0.95)");
        grad.addColorStop(0.35, "rgba(255,117,24,0.92)");
        grad.addColorStop(1, "rgba(255,77,109,0.88)");

        ctx.shadowColor = "#ff7b54";
        ctx.shadowBlur = 14;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, -m.r);
        for (let i = 1; i < 8; i++) {
          const ang = i * Math.PI * 2 / 8;
          const rr = m.r * (0.78 + Math.random() * 0.24);
          ctx.lineTo(Math.cos(ang) * rr, Math.sin(ang) * rr);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    function drawDarts() {
      for (const d of state.darts) {
        ctx.save();
        ctx.translate(d.x, d.y);

        ctx.shadowColor = d.color;
        ctx.shadowBlur = 16;
        ctx.fillStyle = d.color;
        ctx.beginPath();
        ctx.roundRect(-d.w / 2, -d.h / 2, d.w, d.h, 8);
        ctx.fill();

        // 앞부분
        ctx.fillStyle = "#ffffff";
        ctx.globalAlpha = 0.85;
        const dir = d.vx > 0 ? 1 : -1;
        ctx.beginPath();
        ctx.moveTo((d.w / 2) * dir, 0);
        ctx.lineTo((d.w / 2 - 10) * dir, -d.h / 2);
        ctx.lineTo((d.w / 2 - 10) * dir, d.h / 2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    function drawChasers() {
      for (const c of state.chasers) {
        ctx.save();
        const grad = ctx.createRadialGradient(c.x, c.y, 2, c.x, c.y, c.r + 10);
        grad.addColorStop(0, "rgba(255,255,255,0.95)");
        grad.addColorStop(0.45, "rgba(255,107,107,0.95)");
        grad.addColorStop(1, "rgba(255,107,107,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r + 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = "#ff6b6b";
        ctx.shadowBlur = 16;
        ctx.fillStyle = "#ff6b6b";
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(c.x - c.r * 0.2, c.y - c.r * 0.2, c.r * 0.26, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawLasers() {
      for (const l of state.lasers) {
        ctx.save();
        if (l.warning) {
          ctx.strokeStyle = "rgba(255,77,109,0.45)";
          ctx.lineWidth = 2;
          ctx.setLineDash([10, 8]);
          ctx.lineDashOffset = -performance.now() * 0.03;

          if (l.vertical) {
            ctx.beginPath();
            ctx.moveTo(l.x, 0);
            ctx.lineTo(l.x, window.innerHeight);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(0, l.y);
            ctx.lineTo(window.innerWidth, l.y);
            ctx.stroke();
          }
        } else {
          const glow = l.thickness * 2.5;

          if (l.vertical) {
            const grad = ctx.createLinearGradient(l.x - glow, 0, l.x + glow, 0);
            grad.addColorStop(0, "rgba(255,77,109,0)");
            grad.addColorStop(0.35, "rgba(255,77,109,0.18)");
            grad.addColorStop(0.5, "rgba(255,255,255,0.98)");
            grad.addColorStop(0.65, "rgba(255,77,109,0.18)");
            grad.addColorStop(1, "rgba(255,77,109,0)");
            ctx.fillStyle = grad;
            ctx.fillRect(l.x - glow, 0, glow * 2, window.innerHeight);

            ctx.fillStyle = "rgba(255,77,109,0.95)";
            ctx.fillRect(l.x - l.thickness / 2, 0, l.thickness, window.innerHeight);
          } else {
            const grad = ctx.createLinearGradient(0, l.y - glow, 0, l.y + glow);
            grad.addColorStop(0, "rgba(255,77,109,0)");
            grad.addColorStop(0.35, "rgba(255,77,109,0.18)");
            grad.addColorStop(0.5, "rgba(255,255,255,0.98)");
            grad.addColorStop(0.65, "rgba(255,77,109,0.18)");
            grad.addColorStop(1, "rgba(255,77,109,0)");
            ctx.fillStyle = grad;
            ctx.fillRect(0, l.y - glow, window.innerWidth, glow * 2);

            ctx.fillStyle = "rgba(255,77,109,0.95)";
            ctx.fillRect(0, l.y - l.thickness / 2, window.innerWidth, l.thickness);
          }
        }
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of state.particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / 40);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function render() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      drawBackground();
      drawLasers();
      drawMeteors();
      drawDarts();
      drawChasers();
      drawParticles();
      if (player.alive) drawPlayer();
    }

    // ====== 루프 ======
    function loop(ts) {
      const dt = ts - (state.lastTime || ts);
      state.lastTime = ts;

      update(dt);
      render();

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ====== 게임 시작/재시작 ======
    function resetGameState() {
      state.spawnTimerA = 0;
      state.spawnTimerB = 0;
      state.spawnTimerC = 0;
      state.laserTimer = 0;
      state.meteors = [];
      state.darts = [];
      state.chasers = [];
      state.lasers = [];
      state.particles = [];
      state.level = 1;
      state.speedMultiplier = 1;
      state.difficulty = 1;
      elapsed = 0;
      timeText.textContent = "0.00s";
      speedText.textContent = "1.0x";
      hazardText.textContent = "LOW";
      levelText.textContent = "LEVEL 1";
      flashEl.style.background = "rgba(255,77,109,0)";
      hintText.style.opacity = "0.9";
      hintHidden = false;
      resetPlayer();
    }

    function startGame() {
      resetGameState();
      startTime = performance.now();
      gameRunning = true;
      gameOver = false;
      player.alive = true;
      startOverlay.style.display = "none";
      gameOverOverlay.style.display = "none";
    }

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", startGame);
    closeBtn.addEventListener("click", () => {
      gameOverOverlay.style.display = "none";
      startOverlay.style.display = "flex";
    });

    howBtn.addEventListener("click", () => {
      alert(
`[조작 팁]
- 플레이어 가까이를 눌러 끌면 안정적으로 이동
- 레이저는 '경고선'이 나온 뒤 발사됨
- 초반엔 중앙 아래에서 짧게 움직이는 게 유리
- 후반엔 모서리에 오래 머물면 체이서와 레이저에 갇히기 쉬움
- 기록은 생존 시간으로 친구들과 비교하면 됨`
      );
    });

    resetPlayer();
    render();

    // roundRect 호환 보조
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        this.beginPath();
        this.moveTo(x + radius, y);
        this.arcTo(x + w, y, x + w, y + h, radius);
        this.arcTo(x + w, y + h, x, y + h, radius);
        this.arcTo(x, y + h, x, y, radius);
        this.arcTo(x, y, x + w, y, radius);
        this.closePath();
      };
    }
  </script>
</body>
</html>
